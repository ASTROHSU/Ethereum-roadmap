name: Validate EIP Metadata

on:
  schedule:
    # Run twice per day at 6:00 and 18:00 UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate and fix EIP metadata
        run: node scripts/validate-eip-metadata.mjs --fix

      - name: Compile EIPs
        run: node scripts/compile-eips.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 更新 syncInfo.ts 的時間戳
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > src/data/syncInfo.ts << 'TMPL'
          // Auto-generated by sync workflows. Do not edit manually.
          export const syncInfo = {
            lastCheckedAt: 'PLACEHOLDER_NOW',
            lastSyncedAt: 'PLACEHOLDER_NOW',
          };
          TMPL
          sed -i 's/^          //' src/data/syncInfo.ts
          sed -i "s/PLACEHOLDER_NOW/$NOW/g" src/data/syncInfo.ts

          git add -A
          git commit -m "eip metadata sync"
          git push
