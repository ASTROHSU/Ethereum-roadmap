# 自動同步 ethereum/forkcast 上游變更
# - 無衝突 → merge → 偵測雙語檔案變更 → 自動翻譯 → push
# - 有衝突 → 建立 PR 讓你手動處理
name: Sync upstream Forkcast

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream Forkcast
        run: |
          git remote add upstream https://github.com/ethereum/forkcast.git 2>/dev/null || true
          git fetch upstream main --no-tags

      - name: Check for new upstream commits
        id: check
        run: |
          BASE=$(git merge-base HEAD upstream/main 2>/dev/null || echo "")
          if [ -z "$BASE" ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          NEW=$(git rev-list $BASE..upstream/main --count)
          echo "new_commits=$NEW" >> $GITHUB_OUTPUT
          if [ "$NEW" -gt 0 ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Try auto-merge
        if: steps.check.outputs.has_new == 'true'
        id: merge
        run: |
          PRE_SHA=$(git rev-parse HEAD)
          echo "pre_sha=$PRE_SHA" >> $GITHUB_OUTPUT
          if git merge upstream/main --no-edit; then
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            git merge --abort
            echo "conflict=true" >> $GITHUB_OUTPUT
          fi

      # ── 翻譯步驟（merge 成功後、push 前） ──

      - name: Check for translatable changes
        if: steps.merge.outputs.conflict == 'false'
        id: translate_check
        run: |
          CHANGED=$(git diff --name-only ${{ steps.merge.outputs.pre_sha }}..HEAD -- src/data/)
          NEED=""
          for f in roadmapNodes.ts officialRoadmapPhases.ts translations.ts; do
            if echo "$CHANGED" | grep -q "src/data/$f"; then
              NEED="$NEED src/data/$f"
            fi
          done
          NEED=$(echo "$NEED" | xargs)
          echo "files=$NEED" >> $GITHUB_OUTPUT
          if [ -n "$NEED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.translate_check.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Translate upstream changes
        if: steps.translate_check.outputs.has_changes == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node scripts/translate-upstream.mjs --files ${{ steps.translate_check.outputs.files }}

      - name: Commit translations
        if: steps.translate_check.outputs.has_changes == 'true'
        run: |
          git add src/data/
          if git diff --staged --quiet; then
            echo "No translation changes to commit"
          else
            git commit -m "chore: auto-translate upstream changes to Traditional Chinese"
          fi

      # ── Push 或建 PR ──

      - name: Push merged changes
        if: steps.merge.outputs.conflict == 'false'
        run: git push origin main

      - name: Create PR on conflict
        if: steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto-sync/forkcast-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit || true

          git add -A
          git commit -m "chore: sync upstream forkcast (has conflicts)" --no-verify || true
          git push origin "$BRANCH"

          gh pr create \
            --title "Upstream Forkcast sync — 有衝突需手動處理" \
            --body "自動同步 \`ethereum/forkcast\` 時遇到衝突，請手動解決後合併。

          **上游新 commit 數**：${{ steps.check.outputs.new_commits }}
          **差異**：https://github.com/ethereum/forkcast/compare/main...ASTROHSU:Ethereum-roadmap:main" \
            --head "$BRANCH" \
            --base main

      - name: Skip (no new commits)
        if: steps.check.outputs.has_new == 'false'
        run: echo "No new upstream commits."
