# 自動同步 ethereum/forkcast 上游資料檔案
# 改用 file-copy 方式（而非 git merge），因為兩個 repo 沒有共同的 git 歷史
# - 從上游拉取共用資料檔案 → 偵測雙語檔案變更 → 自動翻譯 → push
name: Sync upstream Forkcast

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream files
        run: |
          git remote add upstream https://github.com/ethereum/forkcast.git 2>/dev/null || true
          git fetch upstream main --no-tags

      # 從上游複製共用資料檔案（排除已由其他 workflow 處理的檔案）
      - name: Copy shared data files from upstream
        id: copy
        run: |
          CHANGED_FILES=""

          # 要同步的檔案清單（排除 calls.ts / eips.ts / protocol-calls — 由 sync-call-assets 處理；
          # src/data/eips/*.json 則在本步驟下方透過 sync-forkcast-eips.mjs 同步 fork 關聯與近期進展）
          # 注意：events.ts 可能 import src/data/generated/*；devnet-specs.ts 會 glob src/data/devnets/*。
          # 這些相依資料目錄也要在下方同步，否則上游檔案更新後 Vercel build 會找不到 module。
          SYNC_FILES="src/data/upgrades.ts src/data/events.ts src/data/pending-proposals.ts src/data/devnet-specs.ts"

          for f in $SYNC_FILES; do
            # 檢查上游是否存在此檔案
            if ! git cat-file -e upstream/main:$f 2>/dev/null; then
              echo "  ⚠ $f not found in upstream, skipping"
              continue
            fi

            # 用 git show 寫入暫存檔，比較 hash 判斷是否有差異
            git show upstream/main:$f > /tmp/upstream_file 2>/dev/null
            if [ -f "$f" ] && diff -q "$f" /tmp/upstream_file > /dev/null 2>&1; then
              continue
            fi

            # 寫入新版本
            cp /tmp/upstream_file "$f"
            CHANGED_FILES="$CHANGED_FILES $f"
            echo "  ✓ Updated $f"
          done

          # 同步資料目錄：
          # - prioritization：client priority 資料
          # - generated：events.ts 等上游檔案 import 的 generated JSON
          # - devnets：devnet-specs.ts 透過 import.meta.glob 載入的 spec JSON
          SYNC_DIRS="src/data/prioritization src/data/generated src/data/devnets"
          for dir in $SYNC_DIRS; do
            mkdir -p "$dir"
            for f in $(git ls-tree --name-only -r upstream/main -- "$dir/"); do
              git show upstream/main:$f > /tmp/upstream_file 2>/dev/null
              if [ -f "$f" ] && diff -q "$f" /tmp/upstream_file > /dev/null 2>&1; then
                continue
              fi
              mkdir -p "$(dirname $f)"
              cp /tmp/upstream_file "$f"
              CHANGED_FILES="$CHANGED_FILES $f"
              echo "  ✓ Updated $f"
            done
          done

          # 同步 EIP forkRelationships / statusHistory 等 Forkcast roadmap 欄位。
          # validate-eips 只會從 ethereum/EIPs 更新 frontmatter metadata，不會同步
          # Forkcast 自己維護的升級納入狀態，因此「近期 EIP 動態」曾落後於「協議會議」。
          node scripts/sync-forkcast-eips.mjs | tee /tmp/eip_sync_output
          EIP_CHANGED_FILES=$(grep '^src/data/eips/' /tmp/eip_sync_output | xargs || true)
          if [ -n "$EIP_CHANGED_FILES" ]; then
            CHANGED_FILES="$CHANGED_FILES $EIP_CHANGED_FILES"
          fi

          CHANGED_FILES=$(echo "$CHANGED_FILES" | xargs)
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT

          if [ -n "$CHANGED_FILES" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "::notice::Updated files: $CHANGED_FILES"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "::notice::No upstream changes detected"
          fi

      # ── 資料傳遞與翻譯步驟 ──

      - name: Setup Node.js
        if: steps.copy.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.copy.outputs.has_changes == 'true'
        run: npm ci

      # 把上游的 status/date 變更傳遞到 roadmapNodes.ts（carousel 資料源）
      - name: Propagate status to roadmapNodes
        if: steps.copy.outputs.has_changes == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node scripts/propagate-upstream-status.mjs

      # 重新產生 src/data/eips.json，讓首頁「近期 EIP 動態」吃到剛同步的個別 EIP JSON。
      - name: Compile EIP aggregate
        if: steps.copy.outputs.has_changes == 'true'
        run: npm run compile-eips

      # 檢查翻譯檔案是否有被上游直接修改（罕見但可能）
      - name: Check for translatable changes
        if: steps.copy.outputs.has_changes == 'true'
        id: translate_check
        run: |
          NEED=""
          for f in roadmapNodes.ts officialRoadmapPhases.ts translations.ts; do
            if echo "${{ steps.copy.outputs.changed_files }}" | grep -q "src/data/$f"; then
              NEED="$NEED src/data/$f"
            fi
          done
          NEED=$(echo "$NEED" | xargs)
          echo "files=$NEED" >> $GITHUB_OUTPUT
          if [ -n "$NEED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Translate upstream changes
        if: steps.translate_check.outputs.has_changes == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node scripts/translate-upstream.mjs --files ${{ steps.translate_check.outputs.files }}

      # ── Commit & Push ──

      - name: Commit and push changes
        if: steps.copy.outputs.has_changes == 'true'
        run: |
          git add -A

          if git diff --staged --quiet; then
            echo "No effective changes to commit"
            exit 0
          fi

          # 更新 syncInfo.ts
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > src/data/syncInfo.ts << EOF
          // Auto-generated by sync workflows. Do not edit manually.
          export const syncInfo = {
            lastCheckedAt: '${NOW}',
            lastSyncedAt: '${NOW}',
          };
          EOF
          # 移除前導空白（heredoc 造成）
          sed -i 's/^          //' src/data/syncInfo.ts
          git add src/data/syncInfo.ts

          git commit -m "chore: sync upstream forkcast data

          Updated: ${{ steps.copy.outputs.changed_files }}"
          git push origin main

      - name: Update checked timestamp (no changes)
        if: steps.copy.outputs.has_changes == 'false'
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # 讀取現有的 lastSyncedAt
          LAST_SYNCED=$(grep lastSyncedAt src/data/syncInfo.ts | sed "s/.*'\(.*\)'.*/\1/" || echo "$NOW")
          cat > src/data/syncInfo.ts << EOF
          // Auto-generated by sync workflows. Do not edit manually.
          export const syncInfo = {
            lastCheckedAt: '${NOW}',
            lastSyncedAt: '${LAST_SYNCED}',
          };
          EOF
          sed -i 's/^          //' src/data/syncInfo.ts
          git add src/data/syncInfo.ts

          if ! git diff --staged --quiet; then
            git commit -m "chore: update sync check timestamp [skip ci]"
            git push origin main
          fi

      # ── 報告 ──

      - name: Write summary
        if: always()
        run: |
          echo "## Forkcast 上游同步報告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**執行時間**：$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.copy.outputs.has_changes }}" == "true" ]; then
            echo "### ✅ 已同步上游變更" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**更新的檔案：**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.copy.outputs.changed_files }}" | tr ' ' '\n' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ 無上游更新" >> $GITHUB_STEP_SUMMARY
            echo "上游 \`ethereum/forkcast\` 的共用資料檔案與本地一致，無需同步。" >> $GITHUB_STEP_SUMMARY
          fi
